<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PLANCLUB — VIP Chat</title>
  <link rel="stylesheet" href="../css/chat.css"/>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div id="screen-access" class="screen active">
  <div class="access-container">

    <div class="brand-logo">
      <span class="brand-name">PLANCLUB</span>
      <span class="brand-tag">VIP CHAT</span>
    </div>

    <div class="access-card">
      <div class="card-header-line"></div>
      <p class="access-subtitle">SELECCIONA TU MODO</p>

      <div class="field-group">
        <label class="field-label">QUIERO</label>
        <div class="role-toggle">
          <button class="role-btn active" data-role="crear">
            <span class="role-icon">✦</span> CREAR SALA
          </button>
          <button class="role-btn" data-role="unirse">
            <span class="role-icon">◈</span> UNIRME A UNA
          </button>
        </div>
      </div>

      <div id="panel-crear" style="display:flex; flex-direction:column; gap:18px;">
        <div class="field-group">
          <label class="field-label">TU NOMBRE</label>
          <input class="neon-input" id="input-name-crear" type="text" placeholder="Ej: Diego" autocomplete="off"/>
        </div>
        <button class="enter-btn" id="btn-crear">
          <span>GENERAR CÓDIGO</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <div id="panel-unirse" style="display:none; flex-direction:column; gap:18px;">
        <div class="field-group">
          <label class="field-label">TU NOMBRE</label>
          <input class="neon-input" id="input-name-unirse" type="text" placeholder="Ej: Laura" autocomplete="off"/>
        </div>
        <div class="field-group">
          <label class="field-label">CÓDIGO DE 6 DÍGITOS</label>
          <div class="code-inputs">
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          </div>
          <span class="field-hint">El código lo genera quien crea la sala</span>
        </div>
        <button class="enter-btn" id="btn-unirse">
          <span>UNIRME AL CHAT</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

<div id="screen-espera" class="screen">
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:28px; padding:24px;">

    <div class="brand-logo">
      <span class="brand-name">PLANCLUB</span>
    </div>

    <div class="access-card" style="max-width:380px; width:100%; text-align:center; gap:20px;">
      <div class="card-header-line"></div>

      <p class="access-subtitle">SALA CREADA — ESPERANDO AL OTRO</p>

      <div class="code-display-box">
        <span class="code-display-label">COMPARTE ESTE CÓDIGO</span>
        <span class="code-display-value" id="espera-code">——</span>
        <span class="code-display-sub">El otro debe ingresar este número</span>
      </div>

      <div style="display:flex; align-items:center; gap:8px; justify-content:center;">
        <div class="waiting-spinner"></div>
        <span class="waiting-text">ESPERANDO CONEXIÓN...</span>
      </div>

      <p style="font-size:12px; color:var(--text-mute);">
        Conectado como <span id="espera-name" style="color:var(--cyan)">—</span>
      </p>

      <button class="icon-btn" id="btn-exit-espera" style="width:100%; border-radius:8px; height:38px; font-size:12px; letter-spacing:0.1em; color:var(--text-dim);">
        CANCELAR
      </button>
    </div>

  </div>
</div>

<div id="screen-chat" class="screen" style="flex-direction:column;">

  <div class="chat-header">
    <div class="header-avatar" id="chat-peer-avatar">?</div>
    <div class="header-info">
      <span class="header-name" id="chat-peer-name">—</span>
      <div class="header-status">
        <div class="status-dot waiting" id="chat-status-dot"></div>
        <span id="chat-status-txt">conectando...</span>
      </div>
    </div>
    <span class="header-code-badge" id="chat-room-code"># ——</span>
    <button class="icon-btn" id="btn-exit-chat" title="Salir">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="messages-area" id="messages-area"></div>

  <div class="input-bar locked" id="input-bar">
    <input type="text" class="msg-input" id="msg-input" placeholder="Escribe tu mensaje..." autocomplete="off"/>
    <button class="send-btn" id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </div>

</div>

<script type="module" src="../js/chat.js"></script>

</body>
</html>
