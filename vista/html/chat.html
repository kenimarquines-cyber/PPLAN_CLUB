<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PLANCLUB — VIP Chat</title>
  <link rel="stylesheet" href="../css/chat.css"/>
</head>
<body>

  <div class="bg-layer"></div>
  <div class="grid-overlay"></div>

  <!-- PANTALLA DE ACCESO (LOGIN / SELECCIÓN DE MODO) -->
  <div id="screen-access" class="screen active">
    <div class="access-container">

      <div class="brand-logo">
        <span class="brand-name">PLANCLUB</span>
        <span class="brand-tag">VIP CHAT</span>
      </div>

      <div class="access-card">
        <div class="card-header-line"></div>
        <p class="access-subtitle">SELECCIONA TU MODO</p>

        <!-- Selector de pestañas / roles -->
        <div class="field-group">
          <label class="field-label">QUIERO</label>
          <div class="role-toggle">
            <button class="role-btn active" id="tab-crear" data-role="crear">
              <span class="role-icon">✦</span> CREAR SALA
            </button>
            <button class="role-btn" id="tab-unirse" data-role="unirse">
              <span class="role-icon">◈</span> UNIRME A UNA
            </button>
          </div>
        </div>

        <div id="screen-chat" class="screen" style="display:none;">
    <div class="chat-container" style="display:flex; flex-direction:column; height:100vh; padding:20px; color:#fff;">
      
      <div class="chat-header" style="display:flex; align-items:center; gap:12px; border-bottom:1px solid #222; padding-bottom:10px;">
        <div id="chat-peer-avatar" class="avatar" style="background:#00f3ff; color:#000; padding:8px 14px; border-radius:50%; font-weight:bold;">-</div>
        <div>
          <h3 id="chat-peer-name" style="margin:0; font-size:16px;">Cargando...</h3>
          <span style="display:flex; align-items:center; gap:6px; font-size:12px; color:#aaa;">
            <span id="chat-status-dot" class="waiting" style="width:8px; height:8px; background:#ff4455; border-radius:50%;"></span>
            <span id="chat-status-txt">conectando</span>
          </span>
        </div>
        <span id="chat-room-code" style="margin-left:auto; font-family:monospace; color:#00f3ff;"># ------</span>
      </div>

      <div id="chat-messages" style="flex:1; overflow-y:auto; padding:20px 0;">
        </div>

      <div id="input-bar" class="locked" style="display:flex; gap:10px;">
        <input type="text" placeholder="Escribe un mensaje VIP..." style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:12px; border-radius:8px;" />
        <button style="background:#00f3ff; color:#000; border:none; padding:0 20px; border-radius:8px; font-weight:bold;">ENVIAR</button>
      </div>

    </div>
  </div>

        <!-- Panel para Crear Sala -->
        <div id="panel-crear" style="display:flex; flex-direction:column; gap:18px;">
          <div class="field-group">
            <label class="field-label">TU NOMBRE</label>
            <input class="neon-input" id="input-name-crear" type="text" placeholder="Ej: Diego" autocomplete="off"/>
          </div>
          <button class="enter-btn" id="btn-crear">
            <span>GENERAR CÓDIGO</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>

        <!-- Panel para Unirse a Sala -->
        <div id="panel-unirse" style="display:none; flex-direction:column; gap:18px;">
          <div class="field-group">
            <label class="field-label">TU NOMBRE</label>
            <input class="neon-input" id="input-name-unirse" type="text" placeholder="Ej: Laura" autocomplete="off"/>
          </div>
          
          <div class="field-group">
            <label class="field-label">CÓDIGO DE 6 DÍGITOS</label>
            <div class="code-inputs">
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
              <input class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            </div>
            <span class="field-hint">El código lo genera quien crea la sala</span>
          </div>
          
          <button class="enter-btn" id="btn-unirse">
            <span>UNIRME AL CHAT</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>

      </div> <!-- Cierre de access-card -->
    </div> <!-- Cierre de access-container -->
  </div> <!-- Cierre de screen-access -->

  <!-- PANTALLA DE ESPERA (LOBBY DE LA SALA CREADA) -->
  <div id="screen-espera" class="screen">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:28px; padding:24px;">

      <div class="brand-logo">
        <span class="brand-name">PLANCLUB</span>
      </div>

      <div class="access-card" style="max-width:380px; width:100%; text-align:center; gap:20px;">
        <div class="card-header-line"></div>
        <p class="access-subtitle">SALA CREADA — ESPERANDO AL OTRO</p>

        <div class="code-display-box">
          <span class="code-display-label">COMPARTE ESTE CÓDIGO</span>
          <span class="code-display-value" id="espera-code">——</span>
          <span class="code-display-sub">El otro debe ingresar este número</span>
        </div>

        <div style="display:flex; align-items:center; gap:8px; justify-content:center;">
          <!-- Aquí puedes meter un spinner de carga o indicador de estado de conexión -->
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="../js/chat.js"></script>
</body>
</html>
